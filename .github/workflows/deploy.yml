name: Deploy Mendix AI Suite

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate config.js
        env:
          SUPABASE_URL: ${{ secrets.APP_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.APP_SUPABASE_KEY }}
        run: |
          printf 'const APP_CONFIG = {\n  SUPABASE_URL: "%s",\n  SUPABASE_KEY: "%s"\n};\n' "$SUPABASE_URL" "$SUPABASE_KEY" > config.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
